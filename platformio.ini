; ============================================================
;  Flora Smart Pot - PlatformIO Configuration
;  Supported boards:
;    - esp32dev   : generic ESP32 DevKit / LOLIN32 v1.0.0
;    - lolin_d32  : Wemos LOLIN D32
; ============================================================

; ── Shared settings (inherited by all envs) ─────────────────
[env]
framework      = arduino
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder
lib_deps =
    Wire
    Preferences
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    ;https://github.com/rafacastalla/MPU9250-1
    blynkkk/Blynk@^1.3.2
    tzapu/WiFiManager @ ^2.0.16-rc2

; ── ESP32 DevKit / LOLIN32 v1.0.0 ───────────────────────────
; WARNING: Uses default pin mapping (see README for known
;          strapping-pin conflicts on GPIO 2 and GPIO 12).
[env:esp32dev]
platform      = espressif32
board         = esp32dev
upload_speed  = 115200

; ── Wemos LOLIN D32 ─────────────────────────────────────────
; Recommended board. Safe pin mapping, built-in LiPo charger,
; dedicated VBAT sense on GPIO 35.
[env:lolin_d32]
platform               = espressif32
board                  = lolin_d32
upload_speed           = 921600
board_build.mcu        = esp32
board_build.f_cpu      = 240000000L
board_build.flash_size = 4MB
board_build.flash_mode = dio
board_upload.flash_size = 4MB
; Tell the compiler which pin profile to compile
build_flags = -D BOARD_LOLIN_D32