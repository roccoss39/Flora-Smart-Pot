; ============================================================
;  Flora Smart Pot - PlatformIO Configuration
;
;  Środowiska:
;    lolin32          – LOLIN32 v1.0.0,  produkcja
;    lolin32_test     – LOLIN32 v1.0.0,  tryb testowy
;    lolin_d32        – LOLIN D32,        produkcja
;    lolin_d32_test   – LOLIN D32,        tryb testowy
;
;  BatteryMonitor.cpp automatycznie dobiera parametry:
;    brak flagi        → LOLIN32 (zewnętrzny dzielnik R1/R4, mnożnik ≈1.33)
;    -D BOARD_LOLIN_D32 → LOLIN D32 (wbudowany dzielnik 1:2, mnożnik 2.0)
; ============================================================

; ── Wspólne ustawienia (dziedziczone przez wszystkie env) ────
[env]
framework       = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
lib_deps =
    Wire
    Preferences
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    ;https://github.com/rafacastalla/MPU9250-1
    blynkkk/Blynk@^1.3.2
    tzapu/WiFiManager @ ^2.0.16-rc2

; ── Filtr src dla trybu testowego (wyklucza prawdziwe sensory) ─
[test_src_filter]
src_filter =
    +<*>
    -<SoilSensor.cpp>
    -<WaterLevelSensor.cpp>
    -<BatteryMonitor.cpp>
    -<EnvironmentSensor.cpp>
    -<PumpControl.cpp>

; ============================================================
;  LOLIN32 v1.0.0
;  Brak flagi BOARD_LOLIN_D32 → BatteryMonitor używa R1/R4
; ============================================================

[env:lolin32]
platform      = espressif32
board         = lolin32
upload_speed  = 921600
; Brak build_flags → BatteryMonitor.cpp kompiluje gałąź LOLIN32

[env:lolin32_test]
platform      = espressif32
board         = lolin32
upload_speed  = 921600
build_flags   = -D TEST_MODE
src_filter =
    +<*>
    -<SoilSensor.cpp>
    -<WaterLevelSensor.cpp>
    -<BatteryMonitor.cpp>
    -<EnvironmentSensor.cpp>
    -<PumpControl.cpp>

; ============================================================
;  LOLIN D32
;  Flaga BOARD_LOLIN_D32 → BatteryMonitor używa wbudowanego VBAT
; ============================================================

[env:lolin_d32]
platform               = espressif32
board                  = lolin_d32
upload_speed           = 921600
board_build.mcu        = esp32
board_build.f_cpu      = 240000000L
board_build.flash_size = 4MB
board_build.flash_mode = dio
board_upload.flash_size = 4MB
build_flags            = -D BOARD_LOLIN_D32

[env:lolin_d32_test]
platform               = espressif32
board                  = lolin_d32
upload_speed           = 921600
board_build.mcu        = esp32
board_build.f_cpu      = 240000000L
board_build.flash_size = 4MB
board_build.flash_mode = dio
board_upload.flash_size = 4MB
build_flags =
    -D BOARD_LOLIN_D32
    -D TEST_MODE
src_filter =
    +<*>
    -<SoilSensor.cpp>
    -<WaterLevelSensor.cpp>
    -<BatteryMonitor.cpp>
    -<EnvironmentSensor.cpp>
    -<PumpControl.cpp>